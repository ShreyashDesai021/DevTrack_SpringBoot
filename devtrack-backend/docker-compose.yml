services:
  postgres:
    image: postgres:16-alpine
    container_name: devtrack-postgres
    environment:
      POSTGRES_DB: devtrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - devtrack-network

  backend:
    build: .
    container_name: devtrack-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/devtrack
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: dGVzdC1zZWNyZXQta2V5LXRoYXQtaXMtbG9uZy1lbm91Z2gtZm9yLUhTMjU2
      JWT_EXPIRATION: 86400000
    depends_on:
      - postgres
    networks:
      - devtrack-network

  test:
    image: maven:3.9-eclipse-temurin-17
    working_dir: /app
    volumes:
      - .:/app
      - maven-cache:/root/.m2
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/devtrack
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: dGVzdC1zZWNyZXQta2V5LXRoYXQtaXMtbG9uZy1lbm91Z2gtZm9yLUhTMjU2
      JWT_EXPIRATION: 86400000
    depends_on:
      - postgres
    networks:
      - devtrack-network
    command: mvn clean test
    profiles:
      - test

volumes:
  postgres-data:
  maven-cache:

networks:
  devtrack-network: