version: "3.8"

services:
  db:
    image: postgres:15
    container_name: devtrack-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: devtrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

  devtrack-backend:
    build: .
    container_name: devtrack-springboot-app

    ports:
      - "8080:8080"

    depends_on:
      - db

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/devtrack
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

      SPRING_JPA_HIBERNATE_DDL_AUTO: update

volumes:
  pgdata:
